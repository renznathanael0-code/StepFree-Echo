<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StepFree Echo - Barrierefreie Hindernis-Karte</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="burger-menu-icon" onclick="toggleMenu()" aria-label="Menü öffnen" role="button" style="position: absolute; top: 20px; left: 20px; z-index: 2000; background: #1e293b; color: white; padding: 12px; border-radius: 8px; cursor: pointer; font-size: 24px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); border: 1px solid #334155;">
    ☰
</div>

<div id="side-menu" style="position: fixed; top: 0; left: -280px; width: 250px; height: 100%; background: #1e293b; z-index: 2001; transition: left 0.3s ease; padding: 20px; box-shadow: 5px 0 15px rgba(0,0,0,0.5); border-right: 1px solid #334155;">
    <div onclick="toggleMenu()" style="text-align: right; font-size: 24px; color: #ef4444; cursor: pointer; margin-bottom: 20px;">✕</div>
    <h3 style="color: #00f2fe; margin-top: 0;">StepFree Echo</h3>
    <ul style="list-style: none; padding: 0; margin: 0;">
        <li style="margin-bottom: 15px;">
            <a href="index.html" style="color: white; text-decoration: none; font-size: 1.1em; font-weight: bold;">🗺️ Hauptkarte</a>
        </li>
        <li style="margin-bottom: 15px;">
            <a href="help.html" style="color: white; text-decoration: none; font-size: 1.1em; font-weight: bold;">🔊 Akustische Anleitung</a>
        </li>
    </ul>
</div>

<script>
function toggleMenu() {
    const menu = document.getElementById('side-menu');
    if (menu.style.left === '0px') {
        menu.style.left = '-280px';
    } else {
        menu.style.left = '0px';
    }
}
</script>


    <button id="splash-screen" role="button" aria-label="Willkommen bei StepFree Echo. Tippe doppelt auf den Bildschirm, um die App und die barrierefreie Sprachsteuerung zu starten.">
        <div class="splash-content">
            <h1>StepFree Echo</h1>
            <p>Tippen zum Starten</p>
            <div class="splash-pulse"></div>
        </div>
    </button>

    <div id="app-content" class="hidden">
        <header class="app-header">
            <h1 aria-live="polite">StepFree Echo</h1>
            <div class="status-badge">
                <span class="status-dot"></span>
                <p id="speech-status" role="status">Warte auf Aktivierungswort...</p>
            </div>
        </header>

        <main class="app-container">
            <section id="map-container" aria-label="Interaktive Karte. Sehende können durch Klicken auf die Karte Hindernisse melden.">
                <div id="map"></div>
            </section>

            <section id="obstacle-form-section" class="card" aria-labelledby="form-title">
                <h2 id="form-title">Neues Hindernis melden</h2>
                <form id="obstacle-form">
                    <div class="form-group">
                        <label for="obstacle-type">Art des Hindernisses</label>
                        <select id="obstacle-type" required>
                            <option value="baustelle">Baustelle</option>
                            <option value="kein-leitsystem">Fehlendes Blindenleitsystem</option>
                            <option value="hohe-kante">Hohe Bordsteinkante</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="obstacle-desc">Beschreibung (optional)</label>
                        <input type="text" id="obstacle-desc" placeholder="z.B. Baustelle blockiert Gehweg komplett">
                    </div>

                    <button type="submit" id="submit-btn" class="btn-primary">Hindernis auf Position speichern</button>
                </form>
            </section>

            <section id="obstacles-list-section" class="card" aria-labelledby="list-title">
                <h2 id="list-title">Hindernisse in der Nähe</h2>
                <ul id="obstacles-list" class="styled-list"></ul>
            </section>
        </main>
    </div>

    <div id="screenreader-announcer" class="sr-only" aria-live="assertive"></div>

    <script src="script.js"></script>
</body>
</html>
