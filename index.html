<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barrierefreie Hindernis-Karte</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Hindernis-Melder</h1>
        <button id="start-speech" aria-label="Sprachsteuerung starten">Sprachsteuerung aktivieren</button>
        <p id="speech-status" role="status">Sprachsteuerung ist offline.</p>
    </header>

    <main>
        <section id="map-container" aria-label="Interaktive Karte">
            <div id="map" role="application" aria-label="Kartenansicht"></div>
        </section>

        <section id="obstacle-form-section" aria-labelledby="form-title">
            <h2 id="form-title">Neues Hindernis melden</h2>
            <form id="obstacle-form">
                <label for="obstacle-type">Art des Hindernisses:</label>
                <select id="obstacle-type" required>
                    <option value="baustelle">Baustelle</option>
                    <option value="kein-leitsystem">Fehlendes Blindenleitsystem</option>
                    <option value="hohe-kante">Hohe Bordsteinkante</option>
                    <option value="sonstiges">Sonstiges Hindernis</option>
                </select>

                <label for="obstacle-desc">Beschreibung (optional):</label>
                <input type="text" id="obstacle-desc" placeholder="z.B. Baustelle blockiert Gehweg">

                <button type="submit" id="submit-btn">Hindernis an aktueller Position speichern</button>
            </form>
        </section>

        <section id="obstacles-list-section" aria-labelledby="list-title">
            <h2 id="list-title">Hindernisse in der Nähe</h2>
            <ul id="obstacles-list">
                <li class="obstacle-item">
                    <p><strong>Baustelle Hauptstraße</strong> (Gemeldet am 27.06.2026)</p>
                    <div class="voting-buttons">
                        <button class="vote-up" aria-label="Bestätigen: Dieses Hindernis existiert">Stimmt (12)</button>
                        <button class="vote-down" aria-label="Ablehnen: Dieses Hindernis existiert nicht mehr">Stimmt nicht (1)</button>
                    </div>
                </li>
            </ul>
        </section>
    </main>

    <div id="screenreader-announcer" class="sr-only" aria-live="assertive"></div>

      <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="script.js"></script>
</body>
</html>
