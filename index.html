<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gefahren-Radar für Blinde & Sehbehinderte</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="sr-announcer" class="visually-hidden" aria-live="assertive" aria-atomic="true"></div>

    <header>
        <h1>🛡️ BlindRadar</h1>
        <p>Gemeinsam Hindernisse auf dem Gehweg melden und umgehen.</p>
        <p id="gps-status" aria-live="polite">Suche GPS-Signal...</p>
    </header>

    <main>
        <section aria-labelledby="form-title">
            <h2 id="form-title">Neue Gefahr an Ihrem Standort melden</h2>
            <form id="multiReportForm" onsubmit="finalizeMultiReport(event)">
                
                <fieldset>
                    <legend>Art der Störung (Mehrfachauswahl möglich)</legend>
                    <label><input type="checkbox" name="typ" value="Baustelle auf Leitlinie"> 🚧 Baustelle auf Blindenleitsystem</label>
                    <label><input type="checkbox" name="typ" value="E-Scooter quer auf Gehweg"> 🛴 E-Scooter quer auf dem Gehweg</label>
                    <label><input type="checkbox" name="typ" value="Mülltonne blockiert Weg"> 🗑️ Mülltonne blockiert Leitlinie</label>
                    <label><input type="checkbox" name="typ" value="Ast in Kopfhöhe"> 🌳 Ast / Strauch in Kopfhöhe</label>
                    <label><input type="checkbox" name="typ" value="Akustisches Signal defekt"> 🔊 Akustisches Ampel-/Bahnsteig-Signal defekt</label>
                    <label><input type="checkbox" name="typ" value="Auto auf Gehweg"> 🚗 Auto parkt auf dem Gehweg</label>
                </fieldset>

                <div class="form-group">
                    <label for="multiDetails">Zusätzliche Beschreibung (Optional):</label>
                    <textarea id="multiDetails" rows="3" placeholder="z.B. Sträucher hängen weit über den Zaun..."></textarea>
                </div>

                <button type="submit" class="btn-submit">📍 Gefahr an aktueller Position melden</button>
            </form>
        </section>

        <hr>

        <section aria-labelledby="list-title">
            <h2 id="list-title">Gefahren in Ihrer Nähe</h2>
            
            <div class="filter-container">
                <p id="filter-desc">Nach Kategorie filtern:</p>
                <div class="filter-buttons" role="group" aria-describedby="filter-desc">
                    <button class="btn-filter" onclick="toggleFilter('Baustelle auf Leitlinie')">🚧 Baustellen</button>
                    <button class="btn-filter" onclick="toggleFilter('E-Scooter quer auf Gehweg')">🛴 E-Scooter</button>
                    <button class="btn-filter" onclick="toggleFilter('Mülltonne blockiert Weg')">🗑️ Mülltonnen</button>
                    <button class="btn-filter" onclick="toggleFilter('Ast in Kopfhöhe')">🌳 Kopfhöhe</button>
                    <button class="btn-filter" onclick="toggleFilter('Akustisches Signal defekt')">🔊 Ampelsignale</button>
                    <button class="btn-filter" onclick="toggleFilter('Auto auf Gehweg')">🚗 Autos</button>
                </div>
            </div>

            <ul id="obstacle-list" class="obstacle-list" aria-busy="true" aria-live="polite">
                <li>Lade lokale Gefahrenmeldungen...</li>
            </ul>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
